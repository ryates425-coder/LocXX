# Optional local Nakama for development. Production uses Azure (see LocXX README).
# docker compose -f docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - locxx_nakama_pg:/var/lib/postgresql/data
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 8

  nakama:
    image: heroiclabs/nakama:3.25.0
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - |
        /nakama/nakama migrate up --database.address postgres:localdb@postgres:5432/nakama
        exec /nakama/nakama --name locxx-local --database.address postgres:localdb@postgres:5432/nakama \
          --logger.level INFO --session.token_expiry_sec 7200 \
          --console.port 7351 --console.username admin --console.password password
    ports:
      - "7350:7350"
      - "7351:7351"

volumes:
  locxx_nakama_pg:
